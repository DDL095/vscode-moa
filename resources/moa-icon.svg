<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    MoA Bridge icon — 5-role pipeline + iteration feedback loop
    Layout (top to bottom):
      Layer 1: Task input           (1 node, 顶部)
      Layer 2: Planner              (1 node)
      Layer 3: Refs fan-out         (3 nodes 多模型并行)
      Layer 4: Aggregator           (1 node 融合 + next_action 决策)
      Layer 5: Actor/Finalize       (1 node 底部)
    右侧反馈线: 从 Aggregator (Layer 4) 回到 Planner (Layer 2)
      代表 MoA Loop 的迭代——Aggregator 决策 next_action='recon_needed' 时触发新一轮
      （Actor 是终态执行者，不触发循环；反馈源应是 Aggregator）
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- 主流：5 个角色纵向链 -->
  <!-- Layer1 (input, y=14) → Layer2 (Planner, y=32) -->
  <line x1="56" y1="18" x2="56" y2="28" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Layer2 (Planner, y=32) → Layer3 (Refs fan-out, y=56) -->
  <line x1="56" y1="36" x2="36" y2="54" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="36" x2="56" y2="54" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="36" x2="76" y2="54" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Layer3 (Refs, y=56) → Layer4 (Aggregator, y=80) fan-in -->
  <line x1="36" y1="62" x2="56" y2="78" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="62" x2="56" y2="78" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="62" x2="56" y2="78" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Layer4 (Aggregator, y=80) → Layer5 (Actor, y=104) -->
  <line x1="56" y1="84" x2="56" y2="98" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 反馈线（金色）：从 Aggregator (62,80) → 向右 (100,80) → 向上 (100,32) → 指向 Planner (64,32) -->
  <polyline points="62,80 100,80 100,32 64,32"
            fill="none" stroke="#fbbf24" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            marker-end="url(#arrow)"/>

  <!-- Layer 1: Input (顶部白圆点) -->
  <circle cx="56" cy="14" r="6" fill="#ffffff"/>
  <!-- Layer 2: Planner -->
  <circle cx="56" cy="32" r="7" fill="#ffffff"/>
  <!-- Layer 3: 3 Refs 节点（稍小，平行并列） -->
  <circle cx="36" cy="58" r="6" fill="#ffffff"/>
  <circle cx="56" cy="58" r="6" fill="#ffffff"/>
  <circle cx="76" cy="58" r="6" fill="#ffffff"/>
  <!-- Layer 4: Aggregator -->
  <circle cx="56" cy="80" r="7" fill="#ffffff"/>
  <!-- Layer 5: Actor/Finalize（底部，略大） -->
  <circle cx="56" cy="104" r="7" fill="#ffffff"/>
</svg>



