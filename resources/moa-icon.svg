<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- MoA Bridge icon: three overlapping nodes (representing multi-model MoA) connected by bridges -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Three nodes (models) -->
  <circle cx="40" cy="44" r="14" fill="#ffffff" opacity="0.95"/>
  <circle cx="88" cy="44" r="14" fill="#ffffff" opacity="0.95"/>
  <circle cx="64" cy="84" r="14" fill="#ffffff" opacity="0.95"/>
  <!-- Connecting bridges (the "Bridge" in MoA Bridge) -->
  <line x1="40" y1="44" x2="88" y2="44" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="40" y1="44" x2="64" y2="84" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="88" y1="44" x2="64" y2="84" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>
